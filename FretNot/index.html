<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fret Not — Guitar for Total Beginners</title>
<style>
  /* Dark "black studio guitar" theme: glossy black surfaces, chrome/steel
     text, amber "tube-glow" for emphasis, teal "LED" for success/interactive. */
  :root{
    --wood:#242428;
    --wood-dark:#121214;
    --cream:#0b0b0d;
    --card:#1a1a1e;
    --ink:#f4f3ef;
    --muted:#93939c;
    --accent:#2fe0ab;
    --accent-light:#153330;
    --border:#2c2c31;
    --gold:#ffb648;
    --gold-dark:#1b1508;
    --text-soft:#d7d7dd;
    --chrome:#c7cad1;
    --surface-hover:#212126;
    --glow-amber:rgba(255,182,72,.35);
    --glow-teal:rgba(47,224,171,.28);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(ellipse 1200px 700px at 30% -10%, #1c1c21 0%, var(--cream) 60%);
    color:var(--ink);
  }
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--wood-dark);}
  ::-webkit-scrollbar-thumb{background:#3a3a40;border-radius:6px;}
  .app{
    display:flex;
    min-height:100vh;
  }
  nav.sidebar{
    width:220px;
    background:linear-gradient(165deg, #1e1e22 0%, #0c0c0e 75%);
    color:#fff;
    flex-shrink:0;
    padding:24px 0;
    display:flex;
    flex-direction:column;
    box-shadow:2px 0 24px rgba(0,0,0,.5), inset -1px 0 0 rgba(255,255,255,.04);
  }
  nav.sidebar h1{
    font-size:18px;
    margin:0 20px 4px;
    letter-spacing:.3px;
    text-shadow:0 0 16px rgba(255,182,72,.3);
  }
  nav.sidebar .subtitle{
    margin:0 20px 24px;
    font-size:12px;
    color:var(--chrome);
    opacity:.75;
  }
  nav.sidebar button{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:#fff;
    padding:12px 20px;
    font-size:14px;
    cursor:pointer;
    opacity:.8;
    border-left:3px solid transparent;
  }
  nav.sidebar button:hover{opacity:1;background:rgba(255,255,255,.06);}
  nav.sidebar button.active{
    opacity:1;
    background:rgba(255,255,255,.1);
    border-left-color:var(--gold);
    font-weight:600;
  }
  .sidebar-progress{
    margin:auto 20px 4px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,.1);
    font-size:12px;
    color:var(--chrome);
    opacity:.8;
  }
  .sidebar-progress .bar{
    height:6px;
    background:rgba(255,255,255,.1);
    border-radius:4px;
    overflow:hidden;
    margin-top:6px;
  }
  .sidebar-progress .bar-fill{
    height:100%;
    background:var(--gold);
    box-shadow:0 0 8px var(--glow-amber);
  }
  main{
    flex:1;
    padding:32px 40px;
    max-width:920px;
  }
  h2.page-title{
    margin:0 0 4px;
    font-size:26px;
    font-weight:700;
    letter-spacing:-.01em;
  }
  p.page-sub{
    margin:0 0 28px;
    color:var(--muted);
    font-size:14px;
  }
  .cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
    margin-bottom:32px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-top:1px solid rgba(255,255,255,.07);
    border-radius:14px;
    padding:18px;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
  }
  .stat-card .stat-num{
    font-size:28px;
    font-weight:700;
    color:var(--gold);
    text-shadow:0 0 14px var(--glow-amber);
  }
  .stat-card .stat-label{
    font-size:13px;
    color:var(--muted);
    margin-top:2px;
  }
  .panel{
    background:var(--card);
    border:1px solid var(--border);
    border-top:1px solid rgba(255,255,255,.07);
    border-radius:14px;
    padding:20px 24px;
    margin-bottom:20px;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
  }
  .panel h3{
    margin-top:0;
    font-size:16px;
  }
  .lesson-item{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:10px;
    overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,.3);
  }
  .lesson-head{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    cursor:pointer;
    background:var(--card);
  }
  .lesson-head:hover{background:var(--surface-hover);}
  .lesson-num{
    width:26px;height:26px;
    border-radius:50%;
    background:var(--wood);
    color:var(--chrome);
    font-size:12px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .lesson-item.done .lesson-num{
    background:var(--accent);
    color:#06231b;
    box-shadow:0 0 10px var(--glow-teal);
  }
  .lesson-title{
    flex:1;
    font-size:14.5px;
    font-weight:600;
  }
  .lesson-item.done .lesson-title{color:var(--accent);}
  .lesson-tag{
    font-size:11px;
    color:var(--accent);
    background:var(--accent-light);
    padding:2px 8px;
    border-radius:20px;
  }
  .chev{
    color:var(--muted);
    font-size:12px;
    transition:transform .15s;
  }
  .lesson-item.open .chev{transform:rotate(90deg);}
  .lesson-body{
    display:none;
    padding:0 16px 20px 62px;
    font-size:14px;
    line-height:1.6;
    color:var(--text-soft);
  }
  .lesson-item.open .lesson-body{display:block;}
  .lesson-body ol, .lesson-body ul{padding-left:20px;margin:8px 0;}
  .lesson-body li{margin-bottom:6px;}
  .lesson-body .chord-inline{margin:14px 0;}
  .complete-btn{
    margin-top:10px;
    background:var(--accent);
    color:#06231b;
    border:none;
    padding:8px 16px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 2px 12px var(--glow-teal);
  }
  .complete-btn.undo{
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    box-shadow:none;
  }
  .chord-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
  }
  .chord-card{
    background:var(--card);
    border:1px solid var(--border);
    border-top:1px solid rgba(255,255,255,.07);
    border-radius:14px;
    padding:14px;
    text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,.35);
  }
  .chord-card .name{
    font-weight:700;
    font-size:15px;
    margin-top:6px;
    color:var(--ink);
  }
  .chord-card .diff{
    font-size:11px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .chord-card .learned-toggle{
    margin-top:8px;
    width:100%;
    padding:6px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--wood);
    font-size:12px;
    cursor:pointer;
    color:var(--muted);
  }
  .chord-card.learned .learned-toggle{
    background:var(--accent-light);
    color:var(--accent);
    border-color:var(--accent);
    font-weight:600;
  }
  .chord-card.learned{border-color:var(--accent);box-shadow:0 0 18px var(--glow-teal);}
  svg.diagram{display:block;margin:0 auto;}
  .legend{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
  }
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot-sample{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .next-up{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(135deg,var(--wood),var(--wood-dark));
    color:#fff;
    border-radius:14px;
    padding:20px 24px;
    margin-bottom:24px;
    box-shadow:0 10px 28px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .next-up .go-btn{
    background:var(--gold);
    color:var(--gold-dark);
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-size:13px;
    box-shadow:0 0 16px var(--glow-amber);
  }
  .bonus-badge{
    font-size:10px;
    background:var(--gold);
    color:var(--gold-dark);
    padding:2px 6px;
    border-radius:6px;
    margin-left:6px;
    font-weight:700;
  }
  .visual-box{
    background:var(--wood);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    margin:14px 0;
    text-align:center;
    box-shadow:inset 0 1px 4px rgba(0,0,0,.4);
  }
  .visual-caption{
    font-size:12px;
    color:var(--muted);
    margin-top:8px;
    font-style:italic;
  }
  .progression-row{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:6px;
  }
  .prog-step{text-align:center;}
  .prog-name{font-weight:700;color:var(--gold);margin-top:2px;font-size:13px;}
  .prog-arrow{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:22px;
    padding:0 4px;
    color:var(--chrome);
  }
  .prog-count{font-size:10px;color:var(--muted);margin-top:-4px;}
  .chords-section-title{
    font-size:16px;
    font-weight:700;
    margin:28px 0 4px;
    color:var(--gold);
  }
  .section-divider{
    margin:28px 0 14px;
    padding-top:16px;
    border-top:2px dashed var(--border);
    font-size:16px;
    font-weight:800;
    color:var(--gold);
  }
  .section-divider .sub{
    display:block;
    font-size:12px;
    font-weight:400;
    color:var(--muted);
    margin-top:2px;
  }
  .lesson-tag.advanced{
    background:rgba(255,182,72,.15);
    color:var(--gold);
  }
  .blues-chart{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin:10px 0;
  }
  .blues-bar{
    border-radius:8px;
    padding:10px 6px;
    text-align:center;
    color:#111113;
  }
  .blues-bar-num{font-size:10px;opacity:.85;}
  .blues-bar-chord{font-size:16px;font-weight:800;margin-top:2px;}
  .listen-btn{
    display:inline-flex;
    align-items:center;
    gap:5px;
    margin-top:8px;
    background:var(--accent);
    color:#06231b;
    border:none;
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 2px 12px var(--glow-teal);
  }
  .listen-btn:hover{opacity:.9;}
  .listen-btn.playing{background:var(--gold);color:var(--gold-dark);box-shadow:0 0 16px var(--glow-amber);}
  .mode-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    margin:16px 20px 0;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,.1);
    font-size:12px;
    color:var(--chrome);
  }
  .switch{
    position:relative;
    display:inline-block;
    width:38px;
    height:22px;
    flex-shrink:0;
  }
  .switch input{opacity:0;width:0;height:0;}
  .switch .slider{
    position:absolute;
    cursor:pointer;
    inset:0;
    background:rgba(255,255,255,.15);
    border-radius:22px;
    transition:.2s;
  }
  .switch .slider:before{
    content:"";
    position:absolute;
    height:16px;
    width:16px;
    left:3px;
    bottom:3px;
    background:#fff;
    border-radius:50%;
    transition:.2s;
  }
  .switch input:checked + .slider{background:var(--gold);}
  .switch input:checked + .slider:before{transform:translateX(16px);}
  .chord-inline{text-align:center;}

  /* ---------------- Kid Mode: bright, big, bouncy ---------------- */
  body.kid-mode{
    --wood:#6c5ce7;
    --wood-dark:#2e2a6b;
    --cream:#fff8e7;
    --card:#ffffff;
    --ink:#2d2350;
    --muted:#8b83b8;
    --accent:#22c55e;
    --accent-light:#dcfce7;
    --border:#e6ddfa;
    --gold:#ff9f1c;
    --gold-dark:#4a2600;
    --text-soft:#3b3660;
    --chrome:#e4defc;
    --surface-hover:#f5f2ff;
    --glow-amber:rgba(255,159,28,.35);
    --glow-teal:rgba(34,197,94,.3);
    background:radial-gradient(ellipse 1200px 700px at 30% -10%, #ffffff 0%, var(--cream) 60%);
  }
  body.kid-mode nav.sidebar{
    background:linear-gradient(165deg, #8b7cf6 0%, #5b3fd6 75%);
    box-shadow:2px 0 24px rgba(91,63,214,.3), inset -1px 0 0 rgba(255,255,255,.1);
  }
  body.kid-mode nav.sidebar h1{text-shadow:0 0 16px rgba(255,159,28,.5);}
  body.kid-mode h2.page-title{font-size:30px;}
  body.kid-mode .lesson-item,
  body.kid-mode .stat-card,
  body.kid-mode .panel,
  body.kid-mode .chord-card{border-radius:20px;}
  body.kid-mode .lesson-body{font-size:16px;line-height:1.7;}
  body.kid-mode .lesson-title{font-size:16px;}
  body.kid-mode .lesson-num{width:30px;height:30px;font-size:14px;}
  body.kid-mode .complete-btn,
  body.kid-mode .learned-toggle,
  body.kid-mode .listen-btn,
  body.kid-mode .go-btn{
    border-radius:24px;
    font-size:14px;
    padding:10px 18px;
    font-weight:700;
    transition:transform .15s;
  }
  body.kid-mode .complete-btn:hover,
  body.kid-mode .listen-btn:hover,
  body.kid-mode .learned-toggle:hover,
  body.kid-mode .go-btn:hover{transform:scale(1.06);}
  body.kid-mode .stat-card .stat-num{font-size:32px;}
  body.kid-mode .lesson-tag{font-weight:700;}
  body.kid-mode .chords-section-title,
  body.kid-mode .section-divider{display:none;}

  /* ---------------- Kid Mode: badge celebration ---------------- */
  .badge-overlay{
    position:fixed;
    inset:0;
    background:rgba(45,35,80,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    animation:badgeFadeIn .2s ease-out;
    overflow:hidden;
  }
  @keyframes badgeFadeIn{from{opacity:0;}to{opacity:1;}}
  .badge-confetti{
    position:absolute;
    top:-40px;
    font-size:22px;
    animation:confettiFall linear forwards;
    will-change:transform;
  }
  @keyframes confettiFall{
    from{transform:translateY(0) rotate(0deg);opacity:1;}
    to{transform:translateY(110vh) rotate(540deg);opacity:.9;}
  }
  .badge-card{
    position:relative;
    background:#fff;
    border-radius:28px;
    padding:36px 40px;
    text-align:center;
    max-width:320px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    animation:badgePopIn .45s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes badgePopIn{
    0%{transform:scale(.3) rotate(-8deg);opacity:0;}
    60%{transform:scale(1.08) rotate(3deg);opacity:1;}
    100%{transform:scale(1) rotate(0deg);opacity:1;}
  }
  .badge-icon{
    font-size:72px;
    display:inline-block;
    animation:badgeBounce 1s ease-in-out infinite;
  }
  @keyframes badgeBounce{
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-10px) scale(1.08);}
  }
  .badge-eyebrow{
    font-size:13px;
    font-weight:700;
    letter-spacing:.06em;
    color:#ff9f1c;
    text-transform:uppercase;
    margin-top:10px;
  }
  .badge-name{
    font-size:22px;
    font-weight:800;
    color:#2d2350;
    margin-top:4px;
  }
  .badge-dismiss{
    margin-top:20px;
    background:#22c55e;
    color:#06231b;
    border:none;
    padding:12px 28px;
    border-radius:24px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .badge-dismiss:hover{transform:scale(1.05);}
  .badge-shelf{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:10px;
    margin-top:14px;
  }
  .badge-slot{
    text-align:center;
    padding:10px 4px;
    border-radius:14px;
    background:var(--surface-hover);
    border:1px solid var(--border);
  }
  .badge-slot .icon{font-size:26px;display:block;}
  .badge-slot.locked .icon{opacity:.3;filter:grayscale(1);}
  .badge-slot.locked .label{color:var(--muted);}
  .badge-slot.earned{background:var(--accent-light);border-color:var(--accent);}
  .badge-slot .label{
    font-size:10px;
    margin-top:4px;
    font-weight:700;
    color:var(--ink);
    line-height:1.3;
  }
  @media (max-width:700px){
    .app{flex-direction:column;}
    nav.sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:12px;}
    nav.sidebar h1,.subtitle,.sidebar-progress{display:none;}
    nav.sidebar button{width:auto;white-space:nowrap;border-left:none;border-bottom:3px solid transparent;}
    nav.sidebar button.active{border-bottom-color:var(--gold);}
    main{padding:20px;}
  }
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <h1>🎸 Fret Not</h1>
    <div class="subtitle" id="sidebarSubtitle">Guitar for total beginners — zero panic, promise.</div>
    <button class="tab-btn active" data-tab="dashboard" id="tabBtnDashboard">Dashboard</button>
    <button class="tab-btn" data-tab="lessons" id="tabBtnLessons">Lessons</button>
    <button class="tab-btn" data-tab="chords" id="tabBtnChords">Chord Library</button>
    <div class="mode-toggle">
      <label class="switch">
        <input type="checkbox" id="kidModeToggle">
        <span class="slider"></span>
      </label>
      <span id="modeToggleLabel">🎸 Pro Mode</span>
    </div>
    <div class="sidebar-progress">
      <div id="sidebarProgressText">0% complete</div>
      <div class="bar"><div class="bar-fill" id="sidebarBarFill" style="width:0%"></div></div>
    </div>
  </nav>

  <main>
    <section id="tab-dashboard"></section>
    <section id="tab-lessons" style="display:none"></section>
    <section id="tab-chords" style="display:none"></section>
  </main>
</div>

<script>
/* ---------------- Data ---------------- */

// String order in all arrays: index 0 = low E (6th string) ... index 5 = high e (1st string)
const chords = [
  { id:'em', name:'E minor', short:'Em', difficulty:'Easiest — start here', frets:[0,2,2,0,0,0], fingers:[0,2,3,0,0,0] },
  { id:'am', name:'A minor', short:'Am', difficulty:'Easy', frets:['x',0,2,2,1,0], fingers:[0,0,2,3,1,0] },
  { id:'e',  name:'E major', short:'E',  difficulty:'Easy', frets:[0,2,2,1,0,0], fingers:[0,2,3,1,0,0] },
  { id:'c',  name:'C major', short:'C',  difficulty:'Easy-Medium', frets:['x',3,2,0,1,0], fingers:[0,3,2,0,1,0] },
  { id:'g',  name:'G major', short:'G',  difficulty:'Medium (bring snacks)', frets:[3,2,0,0,0,3], fingers:[2,1,0,0,0,3] },
  { id:'d',  name:'D major', short:'D',  difficulty:'Medium', frets:['x','x',0,2,3,2], fingers:[0,0,0,1,3,2] },
  { id:'a',  name:'A major', short:'A',  difficulty:'Easy-Medium', frets:['x',0,2,2,2,0], fingers:[0,0,1,2,3,0] },
  { id:'dm', name:'D minor', short:'Dm', difficulty:'Medium', frets:['x','x',0,2,3,1], fingers:[0,0,0,2,3,1] },
  { id:'f',  name:'F major (baby F)', short:'F', difficulty:'Bonus — boss level', frets:['x','x',3,2,1,1], fingers:[0,0,3,2,1,1], bonus:true },
  // Level-Up chords — introduced in the advanced lessons
  { id:'e5',  name:'E5 (power chord)', short:'E5',  difficulty:'Level-Up — easy', frets:[0,2,2,'x','x','x'], fingers:[0,1,1,0,0,0], advanced:true },
  { id:'e7',  name:'E7', short:'E7',  difficulty:'Level-Up — easy', frets:[0,2,0,1,0,0], fingers:[0,2,0,1,0,0], advanced:true },
  { id:'a7',  name:'A7', short:'A7',  difficulty:'Level-Up — easy', frets:['x',0,2,0,2,0], fingers:[0,0,1,0,3,0], advanced:true },

let __diagramIdCounter = 0;

function chordDiagramSVG(chord, size){
  size = size || 140;
  __diagramIdCounter++;
  const uid = 'cd' + __diagramIdCounter;
  const w = size, h = size * 1.25;
  const marginTop = h * 0.18;
  const marginSide = w * 0.12;
  const numStrings = 6, numFrets = 5;
  const stringGap = (w - marginSide*2) / (numStrings-1);
  const fretGap = (h - marginTop) / numFrets;

  // Kid Mode swaps the black-studio ebony/amber palette for a bright,
  // candy-colored one — same layout and math, different paint job.
  const pal = kidMode ? {
    boardTop:'#fff2c9', boardBottom:'#ffe08a', boardStroke:'#ffb648',
    nut:'#6c5ce7', fret:'#c3b6f7', str:'#8b83b8',
    mute:'#ff5b6e', openFill:'#ffffff', openStroke:'#22c55e',
    dotTop:'#8bf0b0', dotBottom:'#16a34a', dotStroke:'#0f7a34', fingerText:'#0b3d1c',
  } : {
    boardTop:'#2d2d32', boardBottom:'#151517', boardStroke:'#45454c',
    nut:'#dfe1e6', fret:'#7d8088', str:'#a8abb3',
    mute:'#ff6b5e', openFill:'#eceef0', openStroke:'#2fe0ab',
    dotTop:'#ffd98a', dotBottom:'#e0791f', dotStroke:'#7a3f0a', fingerText:'#1b1508',
  };

  let svg = `<svg class="diagram" viewBox="0 0 ${w} ${h}" width="${size}" height="${size*1.25}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs>
    <linearGradient id="board-${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${pal.boardTop}"/>
      <stop offset="100%" stop-color="${pal.boardBottom}"/>
    </linearGradient>
    <radialGradient id="dot-${uid}" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="${pal.dotTop}"/>
      <stop offset="100%" stop-color="${pal.dotBottom}"/>
    </radialGradient>
  </defs>`;

  // fretboard background
  svg += `<rect x="${marginSide-6}" y="${marginTop-4}" width="${w-marginSide*2+12}" height="${numFrets*fretGap+8}" rx="8" fill="url(#board-${uid})" stroke="${pal.boardStroke}" stroke-width="1.5"/>`;

  // fret lines (brighter nut)
  for(let f=0; f<=numFrets; f++){
    const y = marginTop + f*fretGap;
    svg += `<line x1="${marginSide}" y1="${y}" x2="${w-marginSide}" y2="${y}" stroke="${f===0?pal.nut:pal.fret}" stroke-width="${f===0?4:1.4}" stroke-linecap="round"/>`;
  }
  // string lines
  for(let s=0; s<numStrings; s++){
    const x = marginSide + s*stringGap;
    svg += `<line x1="${x}" y1="${marginTop}" x2="${x}" y2="${marginTop+numFrets*fretGap}" stroke="${pal.str}" stroke-width="${1.6 - s*0.15}"/>`;
  }
  // open/mute markers + fretted dots
  for(let s=0; s<numStrings; s++){
    const x = marginSide + s*stringGap;
    const val = chord.frets[s];
    const markerY = marginTop*0.5;
    if(val === 'x'){
      svg += `<text x="${x}" y="${markerY+4}" font-size="${size*0.09}" text-anchor="middle" fill="${pal.mute}" font-weight="800">×</text>`;
    } else if(val === 0){
      svg += `<circle cx="${x}" cy="${markerY}" r="${size*0.045}" fill="${pal.openFill}" stroke="${pal.openStroke}" stroke-width="2" />`;
    } else {
      const y = marginTop + (val - 0.5)*fretGap;
      const r = size*0.075;
      svg += `<circle cx="${x}" cy="${y}" r="${r}" fill="url(#dot-${uid})" stroke="${pal.dotStroke}" stroke-width="1" />`;
      svg += `<ellipse cx="${x-r*0.3}" cy="${y-r*0.35}" rx="${r*0.35}" ry="${r*0.2}" fill="#ffffff" opacity="0.5"/>`;
      const fingerNum = chord.fingers[s];
      if(fingerNum){
        svg += `<text x="${x}" y="${y+size*0.025}" font-size="${size*0.08}" text-anchor="middle" dominant-baseline="middle" fill="${pal.fingerText}" font-weight="800">${fingerNum}</text>`;
      }
    }
  }
  svg += `</svg>`;
  return svg;
}

/* ---------------- Audio: hear the chord, hear the strum ---------------- */

// Open-string frequencies in standard tuning, low E through high e
const OPEN_STRING_FREQS = [82.41, 110.00, 146.83, 196.00, 246.94, 329.63];

let audioCtx = null;
function getAudioCtx(){
  if(!window.AudioContext && !window.webkitAudioContext) return null;
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function noteFrequency(stringIndex, fret){
  return OPEN_STRING_FREQS[stringIndex] * Math.pow(2, fret / 12);
}

// A single plucked-string-ish note: two oscillators (fundamental + a quiet
// octave harmonic) through a quick pluck envelope and a warm low-pass filter.
function pluckNote(ctx, freq, startTime, duration, peakGain){
  const osc = ctx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = freq;

  const harmonic = ctx.createOscillator();
  harmonic.type = 'sine';
  harmonic.frequency.value = freq * 2;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

  const harmonicGain = ctx.createGain();
  harmonicGain.gain.setValueAtTime(0.0001, startTime);
  harmonicGain.gain.exponentialRampToValueAtTime(peakGain * 0.22, startTime + 0.008);
  harmonicGain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration * 0.55);

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 3200;

  osc.connect(gain); gain.connect(filter);
  harmonic.connect(harmonicGain); harmonicGain.connect(filter);
  filter.connect(ctx.destination);

  osc.start(startTime); osc.stop(startTime + duration + 0.05);
  harmonic.start(startTime); harmonic.stop(startTime + duration * 0.55 + 0.05);
}

// Strums every un-muted string of a chord, low-to-high for a downstrum or
// high-to-low for an upstrum, with a short sweep delay between strings.
function scheduleChordStrum(ctx, chord, direction, startTime){
  let order = [0,1,2,3,4,5];
  if(direction === 'up') order = order.slice().reverse();
  const sweepGap = 0.022;
  const duration = direction === 'up' ? 0.9 : 1.35;
  const peakGain = direction === 'up' ? 0.11 : 0.17;
  let step = 0;
  order.forEach(stringIndex => {
    const val = chord.frets[stringIndex];
    if(val === 'x' || val === undefined) return;
    const freq = noteFrequency(stringIndex, val);
    pluckNote(ctx, freq, startTime + step * sweepGap, duration, peakGain);
    step++;
  });
}

function playChordSound(chordId){
  const chord = chordById(chordId);
  const ctx = getAudioCtx();
  if(!chord || !ctx) return;
  scheduleChordStrum(ctx, chord, 'down', ctx.currentTime + 0.03);
}

// Plays the classic down-up-down-up-down-up-down-up beginner strum pattern
// on Em, so learners can hear the rhythm as well as see it.
function playStrumPatternSound(){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const chord = chordById('em');
  const pattern = ['D','U','D','U','D','U','D','U'];
  const stepGap = 0.42;
  const start = ctx.currentTime + 0.05;
  pattern.forEach((dir, i) => {
    scheduleChordStrum(ctx, chord, dir === 'D' ? 'down' : 'up', start + i * stepGap);
  });
}

// Plays through a chord progression, one strum per chord, so learners can
// preview how the whole sequence sounds together.
function playProgressionSound(chordIds){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const start = ctx.currentTime + 0.05;
  const chordGap = 1.1;
  chordIds.forEach((id, i) => {
    const chord = chordById(id);
    if(chord) scheduleChordStrum(ctx, chord, 'down', start + i * chordGap);
  });
}

// A short, cheerful ascending "ta-da!" chime for Kid Mode badge celebrations.
function playBadgeChimeSound(){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
  const start = ctx.currentTime + 0.03;
  notes.forEach((freq, i) => {
    pluckNote(ctx, freq, start + i * 0.11, 0.9, 0.15);
  });
}

function flashButton(btn){
  if(!btn) return;
  btn.classList.add('playing');
  const original = btn.textContent;
  btn.textContent = '♪ Playing…';
  setTimeout(() => {
    btn.classList.remove('playing');

}

// Down/up strum-pattern timeline, for "Basic Strumming Pattern"
function strumPatternSVG(){
  const pattern = ['D','U','D','U','D','U','D','U'];
  const beatLabels = ['1','&','2','&','3','&','4','&'];
  let svg = `<svg class="diagram strum" viewBox="0 0 480 140" width="100%" style="max-width:480px" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs>
    <linearGradient id="downGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4df0c0"/><stop offset="100%" stop-color="#1a8f6e"/>
    </linearGradient>
    <linearGradient id="upGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcf7a"/><stop offset="100%" stop-color="#e0a030"/>
    </linearGradient>
  </defs>`;
  pattern.forEach((dir,i)=>{
    const x = 40 + i*55;
    const grad = dir==='D' ? 'url(#downGrad)' : 'url(#upGrad)';
    const color = dir==='D' ? '#2fe0ab' : '#ffb648';
    svg += `<text x="${x}" y="16" font-size="13" text-anchor="middle" fill="#9a9aa2" font-weight="700">${beatLabels[i]}</text>`;
    if(dir==='D'){
      svg += `<path d="M ${x-9},30 L ${x+9},30 L ${x+9},55 L ${x+17},55 L ${x},80 L ${x-17},55 L ${x-9},55 Z" fill="${grad}" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>`;
    } else {
      svg += `<path d="M ${x-9},80 L ${x+9},80 L ${x+9},55 L ${x+17},55 L ${x},30 L ${x-17},55 L ${x-9},55 Z" fill="${grad}" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>`;
    }
    svg += `<text x="${x}" y="106" font-size="14" text-anchor="middle" fill="${color}" font-weight="800">${dir}</text>`;
  });
  svg += `<text x="240" y="128" font-size="11" text-anchor="middle" fill="#9a9aa2">↓ toward the floor    ↑ toward the ceiling</text>`;
  svg += `</svg>`;
  return svg;
}

// Horizontal fretboard note map along one string, for "Movable Shapes"
function fretboardStripSVG(rootString){
  const sequences = {
    E: ['E','F','F#','G','G#','A','A#','B','C','C#','D','D#','E'],
    A: ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#','A'],
  };
  const notes = sequences[rootString] || sequences.E;
  const cellW = 46, startX = 66, topY = 20, stripH = 46;
  const totalW = startX + cellW*12 + 20;
  let svg = `<svg class="diagram fretstrip" viewBox="0 0 ${totalW} 100" width="100%" style="max-width:640px" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs><linearGradient id="stripGrad-${rootString}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d2d32"/><stop offset="100%" stop-color="#151517"/></linearGradient></defs>`;
  svg += `<rect x="${startX}" y="${topY}" width="${cellW*12}" height="${stripH}" fill="url(#stripGrad-${rootString})" stroke="#45454c" stroke-width="2"/>`;
  [3,5,7,9].forEach(f=>{
    const x = startX + (f-0.5)*cellW;
    svg += `<circle cx="${x}" cy="${topY+stripH+10}" r="4" fill="#ffb648"/>`;
  });
  const x12 = startX + (12-0.5)*cellW;
  svg += `<circle cx="${x12-6}" cy="${topY+stripH+10}" r="4" fill="#ffb648"/>`;
  svg += `<circle cx="${x12+6}" cy="${topY+stripH+10}" r="4" fill="#ffb648"/>`;
  for(let f=0; f<=12; f++){
    const x = startX + f*cellW;
    svg += `<line x1="${x}" y1="${topY}" x2="${x}" y2="${topY+stripH}" stroke="${f===0?'#dfe1e6':'#8a8d94'}" stroke-width="${f===0?5:1.5}"/>`;
  }
  svg += `<text x="${startX-12}" y="${topY+stripH/2+5}" font-size="12" text-anchor="end" font-weight="700" fill="#e8e8ec">${rootString} open</text>`;
  for(let f=1; f<=12; f++){
    const cx = startX + (f-0.5)*cellW;
    const note = notes[f];
    const isSharp = note.includes('#');
    svg += `<circle cx="${cx}" cy="${topY+stripH/2}" r="15" fill="${isSharp ? '#3a3a40' : '#2fe0ab'}" stroke="${isSharp?'#6b6b74':'#1a8f6e'}" stroke-width="1.5"/>`;
    svg += `<text x="${cx}" y="${topY+stripH/2+4}" font-size="12" text-anchor="middle" font-weight="700" fill="${isSharp?'#c7cad1':'#06231b'}">${note}</text>`;
    svg += `<text x="${cx}" y="${topY+stripH+28}" font-size="10" text-anchor="middle" fill="#9a9aa2">${f}</text>`;
  }
  svg += `</svg>`;
  return svg;
}

// Basic fingerpicking pattern timeline, for "Basic Fingerpicking Pattern"
function fingerpickPatternSVG(){
  const steps = [
    { label:'T', sub:'Bass string', color:'#ffb648' },
    { label:'i', sub:'G string',    color:'#2fe0ab' },
    { label:'m', sub:'B string',    color:'#c7cad1' },
    { label:'i', sub:'G string',    color:'#2fe0ab' },
  ];
  const totalSteps = 8;
  let svg = `<svg class="diagram fingerpick" viewBox="0 0 480 130" width="100%" style="max-width:480px" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0; i<totalSteps; i++){
    const step = steps[i % steps.length];
    const x = 40 + i*55;
    svg += `<text x="${x}" y="16" font-size="12" text-anchor="middle" fill="#9a9aa2">${i+1}</text>`;
    svg += `<circle cx="${x}" cy="55" r="20" fill="${step.color}"/>`;
    svg += `<text x="${x}" y="61" font-size="16" text-anchor="middle" font-weight="800" fill="#111113">${step.label}</text>`;
    svg += `<text x="${x}" y="98" font-size="10" text-anchor="middle" fill="#9a9aa2">${step.sub}</text>`;
  }
  svg += `<text x="240" y="120" font-size="11" text-anchor="middle" fill="#9a9aa2">T = thumb (bass note)   i / m = index &amp; middle fingers</text>`;
  svg += `</svg>`;
  return svg;
}

// Simple tab-notation example (arpeggiating Em), for "Reading Guitar Tab"
function tabExampleSVG(){
  const strings = ['e','B','G','D','A','E'];
  const steps = [
    { G:'0' },
    { B:'0' },
    { e:'0' },
    { A:'2', D:'2' },
  ];
  const rowGap = 22, startY = 20, startX = 40, colGap = 70;
  const totalW = startX + colGap*steps.length + 30;
  const totalH = startY + rowGap*5 + 20;
  let svg = `<svg class="diagram tabexample" viewBox="0 0 ${totalW} ${totalH}" width="100%" style="max-width:420px" xmlns="http://www.w3.org/2000/svg">`;
  strings.forEach((s,i)=>{
    const y = startY + i*rowGap;
    svg += `<text x="14" y="${y+4}" font-size="13" font-weight="700" fill="#e8e8ec">${s}</text>`;
    svg += `<line x1="${startX}" y1="${y}" x2="${startX+colGap*steps.length}" y2="${y}" stroke="#8a8d94" stroke-width="1.3"/>`;
  });
  steps.forEach((step,ci)=>{
    const x = startX + colGap*ci + colGap/2;
    strings.forEach((s,ri)=>{
      const val = step[s];
      if(val !== undefined){
        const y = startY + ri*rowGap;
        svg += `<circle cx="${x}" cy="${y}" r="10" fill="#eceef0" stroke="#2fe0ab" stroke-width="2"/>`;
        svg += `<text x="${x}" y="${y+4}" font-size="12" text-anchor="middle" font-weight="700" fill="#06231b">${val}</text>`;
      }
    });
  });
  svg += `</svg>`;
  return svg;
}

  return (kidMode && KID_LESSON_CONTENT[lesson.id]) ? KID_LESSON_CONTENT[lesson.id].body : lesson.body;
}

function renderLessons(openId){
  const el = document.getElementById('tab-lessons');
  const pct = progressPercent();
  const visibleLessons = kidMode ? lessons.filter(l => l.section !== 'advanced' && l.tag !== 'Bonus') : lessons;
  el.innerHTML = `
    <h2 class="page-title">${t('lessonsPageTitle')}</h2>
    <p class="page-sub">${coreLessons.filter(l=>progress.completedLessons.includes(l.id)).length} of ${coreLessons.length} lessons ${kidMode ? 'done' : 'crushed'} (${pct}%)</p>
    <div id="lessonList"></div>
  `;
  const list = document.getElementById('lessonList');
  let advancedDividerShown = false;
  visibleLessons.forEach((lesson, idx) => {
    if(lesson.section === 'advanced' && !advancedDividerShown){
      advancedDividerShown = true;
      const divider = document.createElement('div');
      divider.className = 'section-divider';
      divider.innerHTML = `🚀 Level Up — Advanced Techniques<span class="sub">You've got the basics down. Here's where guitar gets really fun.</span>`;
      list.appendChild(divider);
    }
    const isDone = progress.completedLessons.includes(lesson.id);
    const item = document.createElement('div');
    item.className = 'lesson-item' + (isDone ? ' done' : '');
    item.id = 'lesson-' + lesson.id;
    item.innerHTML = `
      <div class="lesson-head">
        <div class="lesson-num">${isDone ? '✓' : (idx+1)}</div>
        <div class="lesson-title">${lessonTitle(lesson)}</div>
        <span class="lesson-tag${lesson.section==='advanced' ? ' advanced' : ''}">${lesson.tag}</span>
        <span class="chev">▶</span>
      </div>
      <div class="lesson-body">
        ${lessonBody(lesson)}
        <button class="complete-btn ${isDone ? 'undo' : ''}" data-lesson="${lesson.id}">
          ${isDone ? t('markIncompleteBtn') : t('markCompleteBtn')}
        </button>
      </div>
    `;
    list.appendChild(item);

    item.querySelector('.lesson-head').addEventListener('click', () => {
      item.classList.toggle('open');
    });

    // render an inline chord diagram for every chord referenced in this lesson's body
    // (a lesson can embed more than one, e.g. the 7th-chords roundup)
    item.querySelectorAll('.chord-inline').forEach(holder => {
      const cid = holder.dataset.chord || lesson.chordId;
      const chord = cid && chordById(cid);
      if(!chord) return;
      holder.innerHTML = chordDiagramSVG(chord, 130) +
        `<button class="listen-btn" data-listen-chord="${cid}">${t('listenBtn')}</button>`;
      const btn = holder.querySelector('.listen-btn');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        playChordSound(cid);
        flashButton(btn);
      });
    });

    // render any additional teaching visuals embedded in this lesson's body
    item.querySelectorAll('.visual-inline').forEach(vh => {
      const type = vh.dataset.visual;
      if(type === 'anatomy') vh.innerHTML = guitarAnatomySVG();
      else if(type === 'handposition') vh.innerHTML = handPositionSVG();
      else if(type === 'annotatedchord') vh.innerHTML = annotatedChordExampleSVG();
      else if(type === 'strumpattern'){
        vh.innerHTML = strumPatternSVG() + `<button class="listen-btn">${t('playPatternBtn')}</button>`;
        const btn = vh.querySelector('.listen-btn');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          playStrumPatternSound();
          flashButton(btn);
        });
      }
      else if(type === 'progression'){
        const ids = vh.dataset.chords.split(',');
        vh.innerHTML = progressionVisualHTML(ids) + `<button class="listen-btn">${t('previewProgBtn')}</button>`;
        const btn = vh.querySelector('.listen-btn');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          playProgressionSound(ids);
          flashButton(btn);
        });
      }
      else if(type === 'fretstrip-e') vh.innerHTML = fretboardStripSVG('E');
      else if(type === 'fretstrip-a') vh.innerHTML = fretboardStripSVG('A');
      else if(type === 'fingerpick') vh.innerHTML = fingerpickPatternSVG();
      else if(type === 'tabexample') vh.innerHTML = tabExampleSVG();
      else if(type === 'blueschart') vh.innerHTML = bluesChartHTML(['E7','E7','E7','E7','A7','A7','E7','E7','B7','A7','E7','B7']);
    });

    item.querySelector('.complete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleLessonComplete(lesson.id);
    });
  });

  if(openId){
    openLesson(openId, false);
  }
}

function openLesson(id, scroll){
  const item = document.getElementById('lesson-' + id);
  if(!item) return;
  item.classList.add('open');
  if(scroll) item.scrollIntoView({ behavior:'smooth', block:'center' });
}

// Confetti-and-badge celebration shown in Kid Mode when a lesson is completed.
function showBadgeCelebration(lessonId){
  const badge = BADGES[lessonId];
  if(!badge) return;

  playBadgeChimeSound();

  const overlay = document.createElement('div');
  overlay.className = 'badge-overlay';

  const confettiEmoji = ['🎉','⭐','🎈','✨','🎵','💫'];
  for(let i = 0; i < 26; i++){
    const piece = document.createElement('span');
    piece.className = 'badge-confetti';
    piece.textContent = confettiEmoji[i % confettiEmoji.length];
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    piece.style.fontSize = (16 + Math.random() * 16) + 'px';
    overlay.appendChild(piece);
  }

  const card = document.createElement('div');
  card.className = 'badge-card';
  card.innerHTML = `
    <div class="badge-icon">${badge.emoji}</div>
    <div class="badge-eyebrow">You earned a badge!</div>
    <div class="badge-name">${badge.name}</div>
    <button class="badge-dismiss">Awesome! 🙌</button>
  `;
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  const closeOverlay = () => { if(overlay.parentNode) overlay.remove(); };
  card.querySelector('.badge-dismiss').addEventListener('click', closeOverlay);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) closeOverlay(); });
  setTimeout(closeOverlay, 7000);
}

function toggleLessonComplete(lessonId){
  const i = progress.completedLessons.indexOf(lessonId);
  const isNowComplete = i === -1;
  if(isNowComplete) progress.completedLessons.push(lessonId);
  else progress.completedLessons.splice(i,1);

  let earnedNewBadge = false;
  if(isNowComplete && kidMode && BADGES[lessonId] && !progress.badges.includes(lessonId)){
    progress.badges.push(lessonId);
    earnedNewBadge = true;
  }

  saveProgress(progress);
  updateSidebarProgress();
  renderLessons(lessonId);
  document.getElementById('lesson-' + lessonId).classList.add('open');

  if(earnedNewBadge) showBadgeCelebration(lessonId);
}

function renderChordGrid(containerId, chordList){
  const grid = document.getElementById(containerId);
  chordList.forEach(chord => {
    const isLearned = progress.learnedChords.includes(chord.id);
    const diffText = (kidMode && KID_CHORD_DIFF[chord.id]) ? KID_CHORD_DIFF[chord.id] : chord.difficulty;
    const card = document.createElement('div');
    card.className = 'chord-card' + (isLearned ? ' learned' : '');
    card.innerHTML = `
      ${chordDiagramSVG(chord, 110)}
      <div class="name">${chord.short}${chord.bonus ? '<span class="bonus-badge">BONUS</span>' : ''}</div>
      <div class="diff">${diffText}</div>
      <button class="listen-btn">${t('listenBtn')}</button>
      <button class="learned-toggle" data-chord="${chord.id}">${isLearned ? t('learnedBtnOn') : t('learnedBtnOff')}</button>
    `;
    grid.appendChild(card);
    const listenBtn = card.querySelector('.listen-btn');
    listenBtn.addEventListener('click', () => {
      playChordSound(chord.id);
      flashButton(listenBtn);
    });
    card.querySelector('.learned-toggle').addEventListener('click', () => {
      toggleChordLearned(chord.id);
    });
  });
}

function renderChords(){
  const el = document.getElementById('tab-chords');
  const coreChords = chords.filter(c => !c.advanced);
  const advancedChords = chords.filter(c => c.advanced);
  el.innerHTML = `
    <h2 class="page-title">${t('chordsPageTitle')}</h2>
    <p class="page-sub">${t('chordsPageSub')}</p>
    <div class="legend">
      <span><span class="dot-sample" style="background:#ffb648"></span> Press here (number = finger)</span>
      <span>○ Strum it open</span>
      <span>× Skip this string</span>
    </div>
    <br/>
    <div class="chord-grid" id="chordGrid"></div>
    ${kidMode ? '' : `
    <div class="chords-section-title">🚀 Level-Up Chords</div>
    <p class="page-sub" style="margin-bottom:16px;">From the advanced lessons — come back here any time you need a reminder.</p>
    <div class="chord-grid" id="chordGridAdvanced"></div>
    `}
  `;
  renderChordGrid('chordGrid', coreChords);
  if(!kidMode) renderChordGrid('chordGridAdvanced', advancedChords);
}

function toggleChordLearned(chordId){
  const i = progress.learnedChords.indexOf(chordId);
  if(i === -1) progress.learnedChords.push(chordId);
  else progress.learnedChords.splice(i,1);
  saveProgress(progress);
  renderChords();
}

function updateSidebarProgress(){
  const pct = progressPercent();
  document.getElementById('sidebarProgressText').textContent = pct + '% complete';
  document.getElementById('sidebarBarFill').style.width = pct + '%';
}

/* ---------------- Tabs ---------------- */

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.getElementById('tab-dashboard').style.display = name === 'dashboard' ? 'block' : 'none';
  document.getElementById('tab-lessons').style.display = name === 'lessons' ? 'block' : 'none';
  document.getElementById('tab-chords').style.display = name === 'chords' ? 'block' : 'none';
  if(name === 'dashboard') renderDashboard();
  if(name === 'lessons') renderLessons();
  if(name === 'chords') renderChords();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

/* ---------------- Init ---------------- */

updateSidebarProgress();
document.getElementById('kidModeToggle').addEventListener('change', (e) => {
  kidMode = e.target.checked;
  saveKidMode(kidMode);
  applyKidModeUI();
});
applyKidModeUI();
</script>
</body>
</html>
